<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CB Cafe Racer Build — ongoing project at JnA Motors.">
  <title>CB Build — JnA Motors</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-project-detail">
  <nav class="nav">
    <a href="index.html" class="nav-brand">JnA Motors</a>
    <a href="index.html" class="nav-link">Home</a>
    <a href="projects.html" class="nav-link">Projects</a>
    <a href="harley-work.html" class="nav-link">Harley Work</a>
    <a href="custom-woodworking.html" class="nav-link">Custom Wood Working</a>
    <a href="games.html" class="nav-link">Games</a>
  </nav>
  <main class="page-content project-detail">
    <a href="projects.html" class="back-link">← Projects</a>
    <h1 class="page-title">CB Build</h1>
    <p class="project-body">
      Here are images from our CB Build that's ongoing.
    </p>

    <div class="photo-grid">
      <div class="photo-frame">
        <img src="images/cb-hondawithsign.jpeg" alt="Honda CB with sign">
      </div>
      <div class="photo-frame">
        <img src="images/cb-framewithengine.jpeg" alt="CB frame with engine">
      </div>
      <div class="photo-frame">
        <img src="images/cb-jamesnbike.jpeg" alt="James and the bike">
      </div>
    </div>
  </main>
  <footer class="site-footer">
    <p>© <span id="year"></span> JnA Motors</p>
  </footer>
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <button class="lightbox-close" id="lightboxClose" aria-label="Close">&times;</button>
    <img id="lightboxImg" src="" alt="">
  </div>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  <script>
    (function(){
      var lb = document.getElementById('lightbox');
      var lbImg = document.getElementById('lightboxImg');
      document.querySelectorAll('.photo-frame img').forEach(function(img){
        img.addEventListener('click', function(){
          lbImg.src = img.src; lbImg.alt = img.alt;
          lb.classList.add('open');
        });
      });
      function close(){ lb.classList.remove('open'); lbImg.src=''; }
      document.getElementById('lightboxClose').addEventListener('click', close);
      lb.addEventListener('click', function(e){ if(e.target===lb) close(); });
      document.addEventListener('keydown', function(e){ if(e.key==='Escape') close(); });
    })();
  </script>
</body>
</html>
